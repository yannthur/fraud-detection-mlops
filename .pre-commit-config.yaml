# .pre-commit-config.yaml
# Framework de qualité de code pour le projet fraud-detection-mlops

repos:
  # ── Hooks génériques ──────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-added-large-files
        args: ['--maxkb=5120']
      - id: detect-private-key
      - id: check-merge-conflict
      - id: debug-statements

  # ── Formatage Python avec Black ───────────────────────────────
  - repo: https://github.com/psf/black
    rev: 23.11.0
    hooks:
      - id: black
        language_version: python3.10
        args: ['--line-length=88']

  # ── Tri des imports avec isort ────────────────────────────────
  - repo: https://github.com/pycqa/isort
    rev: 5.12.0
    hooks:
      - id: isort
        args: ['--profile=black', '--line-length=88']

  # ── Linting PEP 8 avec flake8 ─────────────────────────────────
  - repo: https://github.com/pycqa/flake8
    rev: 6.1.0
    hooks:
      - id: flake8
        args:
          - '--max-line-length=88'
          - '--extend-ignore=E203,W503,E402'
          - '--max-complexity=10'
        additional_dependencies:
          - flake8-docstrings
          - flake8-bugbear

  # ── Détection de secrets (detect-secrets) ─────────────────────
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']
