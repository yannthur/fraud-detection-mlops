name: MLOps CI/CD Pipeline

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]

env:
  PYTHON_VERSION: '3.10'

jobs:
  test-and-validate:
    name: Tests & Validation
    runs-on: ubuntu-latest
    outputs:
      test_status: ${{ steps.tests.outcome }}
      accuracy: ${{ steps.validate.outputs.accuracy }}

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Linting flake8
        run: flake8 src/ train.py app.py --max-line-length=88 --extend-ignore=E203,W503,E402

      - name: Formatage black (check only)
        run: black --check src/ train.py app.py

      - name: Tests pytest
        id: tests
        run: |
          pytest tests/ -v --tb=short --junitxml=test-report.xml 2>&1 | tee test-output.txt

      - name: Entraînement du modèle
        run: python train.py

      - name: Validation seuil accuracy
        id: validate
        run: |
          python -c "
          import joblib
          from sklearn.metrics import accuracy_score
          from src.data_preprocessing import load_and_prepare

          model_data = joblib.load('models/fraud_model.pkl')
          model = model_data['model']

          X_train, X_test, y_train, y_test = load_and_prepare('data/train.csv')
          acc = accuracy_score(y_test, model.predict(X_test))
          print(f'ACCURACY={acc:.4f}')
          print(f'Validation: Accuracy {acc:.4f} >= 0.80: {\"PASS\" if acc >= 0.80 else \"FAIL\"}')
          " 2>&1 | tee validation.txt

          ACC=$(grep 'ACCURACY=' validation.txt | cut -d'=' -f2)
          echo "accuracy=$ACC" >> $GITHUB_OUTPUT

      - name: Upload des rapports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports
          path: |
            test-report.xml
            test-output.txt
            validation.txt

  notify:
    name: Notification Email
    runs-on: ubuntu-latest
    needs: test-and-validate
    if: always()

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install google-generativeai

      - name: Générer le rapport via Gemini
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python -c "
          import os
          import google.generativeai as genai

          genai.configure(api_key=os.getenv('GEMINI_API_KEY'))
          model = genai.GenerativeModel('gemini-1.5-flash')

          status = '${{ needs.test-and-validate.result }}'
          accuracy = '${{ needs.test-and-validate.outputs.accuracy }}'

          prompt = f'''Génère un rapport professionnel pour le pipeline MLOps de détection de fraude.
          Statut: {status}
          Accuracy: {accuracy}
          Branche: ${{ github.head_ref }}
          Commit: ${{ github.sha }}
          '''

          response = model.generate_content(prompt)
          print(response.text)
          " > email_body.txt
          cat email_body.txt

      - name: Envoi email
        if: ${{ secrets.SMTP_SERVER != '' }}
        uses: dawidd6/action-send-mail@v4
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "[MLOps] Pipeline ${{ needs.test-and-validate.result == 'success' && '✅ Succès' || '❌ Échec' }}"
          to: ${{ secrets.MAIL_TO }}
          from: ${{ secrets.SMTP_USERNAME }}
          body: file://email_body.txt

  deploy:
    name: Deploy to Hugging Face
    runs-on: ubuntu-latest
    needs: test-and-validate
    if: github.ref == 'refs/heads/main' && needs.test-and-validate.result == 'success'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install huggingface_hub

      - name: Upload modèle sur HF Hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python scripts/upload_to_hub.py

      - name: Mise à jour HF Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python scripts/update_spaces.py
