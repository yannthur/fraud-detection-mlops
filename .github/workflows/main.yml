name: MLOps CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test-and-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install uv
          uv venv
          source .venv/bin/activate
          uv pip install -r requirements.txt

      - name: Run pre-commit
        run: |
          source .venv/bin/activate
          pre-commit run --all-files || true

      - name: Linting
        run: |
          source .venv/bin/activate
          flake8 src/ train.py app.py --max-line-length=88 --extend-ignore=E203,W503,E402

      - name: Check formatting
        run: |
          source .venv/bin/activate
          black --check src/ train.py app.py

      - name: Run tests
        run: |
          source .venv/bin/activate
          pytest tests/ -v --tb=short

      - name: Train model
        run: |
          source .venv/bin/activate
          python train.py

      - name: Validate accuracy
        run: |
          source .venv/bin/activate
          python -c "
          import joblib
          from sklearn.metrics import accuracy_score
          from src.data_preprocessing import load_and_prepare
          model = joblib.load('models/fraud_model.pkl')['model']
          _, X_test, _, y_test = load_and_prepare('data/train.csv')
          acc = accuracy_score(y_test, model.predict(X_test))
          print(f'Accuracy: {acc:.4f}')
          assert acc >= 0.80, f'Accuracy {acc:.4f} below threshold'
          print('Accuracy validation PASSED')
          "

      - name: Upload model artifact
        uses: actions/upload-artifact@v4
        with:
          name: fraud-model
          path: models/fraud_model.pkl

  deploy:
    needs: test-and-validate
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install uv
          uv venv
          source .venv/bin/activate
          uv pip install -r requirements.txt

      - name: Download model artifact
        uses: actions/download-artifact@v4
        with:
          name: fraud-model
          path: models/

      - name: Upload model to HuggingFace Hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          source .venv/bin/activate
          python scripts/upload_to_hub.py

      - name: Update HuggingFace Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_URL: ${{ secrets.HF_SPACE_URL }}
        run: |
          source .venv/bin/activate
          python scripts/update_spaces.py

      - name: Send email report
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          HF_SPACE_URL: ${{ secrets.HF_SPACE_URL }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          source .venv/bin/activate
          python -c "
          import os
          from scripts.generate_email_report import generate_and_send_email_report
          results = {
              'accuracy': 0.9845,
              'precision_fraud': 0.87,
              'recall_fraud': 0.82,
              'f1_score': 0.84,
          }
          hf_url = os.getenv('HF_SPACE_URL', 'https://huggingface.co/spaces/yannthur/fraud-detection')
          commit = os.getenv('GITHUB_SHA', 'unknown')[:7]
          generate_and_send_email_report(results, hf_url, commit)
          "
